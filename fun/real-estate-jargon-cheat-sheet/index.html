    <link rel="stylesheet" href="/jamesvalcourt/assets/css/style.css">

    <!-- Theme Toggle Script (Runs immediately to prevent flash of light/dark) -->
    <script>
        (function() {
            const storedTheme = localStorage.getItem('theme');
            if (storedTheme === 'dark' || (!storedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
</head>
<body>
    <!-- Floating Header Navigation -->
    <header class="site-header">
        <div class="header-container">
            <a href="/jamesvalcourt/" class="site-logo">
                <span class="logo-name">James Valcourt</span>
                <span class="logo-title">Scientist / garlic enthusiast</span>
            </a>

            <button class="nav-toggle" aria-label="Toggle menu" id="js-nav-toggle">
                <span class="hamburger"></span>
            </button>

            <nav class="site-nav" id="js-site-nav">

                    <li><a href="/jamesvalcourt/" class="">Welcome</a></li>

    <!-- Core Interactive Scripts -->
    <script>
        // Responsive Menu Toggle
        const navToggle = document.getElementById('js-nav-toggle');
        const siteNav = document.getElementById('js-site-nav');
        if (navToggle && siteNav) {
            navToggle.addEventListener('click', () => {
                siteNav.classList.toggle('active');
                navToggle.classList.toggle('active');
            });
        }

        // Theme Toggle Functionality
        const themeToggle = document.getElementById('js-theme-toggle');
        if (themeToggle) {
            themeToggle.addEventListener('click', () => {
                const isDark = document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });
        }
    </script>
